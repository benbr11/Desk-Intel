name: keep-awake

# Pings the live app on a schedule so Streamlit Community Cloud never idles it
# to sleep. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          curl -sSL --max-time 90 "https://axurry.streamlit.app/" -o /dev/null \
            && echo "pinged axurry.streamlit.app"
