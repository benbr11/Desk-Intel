name: keep-awake

# Pings the live app on a schedule so Streamlit Community Cloud never idles it
# to sleep. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          # Hit the health endpoint (no redirects) so Streamlit registers traffic.
          # Never fail the job — this is a best-effort keep-alive.
          code=$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
            "https://axurry.streamlit.app/_stcore/health" || echo "000")
          echo "health endpoint returned HTTP $code"
          curl -s -m 60 -o /dev/null "https://axurry.streamlit.app/" || true
          exit 0
